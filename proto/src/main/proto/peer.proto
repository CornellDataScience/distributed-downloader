syntax = "proto3";
package cds.distdownloader.v1;

option java_multiple_files = true;
option java_package = "cds.distdownloader.proto";

import "common.proto";

message FileRequest {
  string file_id = 1;
}

message ChunkBitmap {
  string file_id = 1;
  uint32 num_chunks = 2;
  bytes bitset = 3; // bit i = have chunk i
}

message ChunkRequest {
  ChunkRef chunk = 1;
}

message ChunkResponse {
  bytes data = 1;
}

service Peer {
  rpc GetAvailability(FileRequest) returns (ChunkBitmap);
  rpc GetChunk(ChunkRequest) returns (ChunkResponse);
}
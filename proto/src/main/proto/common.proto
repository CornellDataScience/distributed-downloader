syntax = "proto3";
package cds.distdownloader.v1;

option java_multiple_files = true;
option java_package = "cds.distdownloader.proto";

message PeerEndpoint {
  string id = 1;      // UUID string
  string ip = 2;      // e.g. "192.168.1.12"
  uint32 port = 3;    // peer gRPC port (e.g., 6001)
};

message ChunkRef {
  // Points to one piece of a file: file_id chooses the file, and chunk_index
  // chooses the 0-based piece number (index 3 means the 4th chunk).
  // Peer should return the actual chunk bytes.
  string file_id = 1;
  uint32 chunk_index = 2;
}

message Ack {
  // Minimal generic response for RPCs that only need success/failure + context.
  bool ok = 1;
  string message = 2;
}

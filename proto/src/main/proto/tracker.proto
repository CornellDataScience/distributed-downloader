syntax = "proto3";
package cds.distdownloader.v1;

import "common.proto";

option java_multiple_files = true;
option java_package = "cds.distdownloader.proto";

// Peer sends this periodically (ex: every 5s).
message HeartbeatRequest {
  PeerEndpoint endpoint = 1;
  repeated string file_ids = 2;
}
message HeartbeatResponse {
  Ack ack = 1;
}

// Returns only currently-up peers (not expired by TTL).
message ListPeersRequest {
  // empty: client sends request, tracker doesn't do anything
}
message ListPeersResponse {
  repeated PeerEndpoint up_peers = 1;
}

service Tracker {
  rpc HandleHeartbeatRequest(HeartbeatRequest) returns (HeartbeatResponse);
  rpc HandleListPeersRequest(ListPeersRequest) returns (ListPeersResponse);
}